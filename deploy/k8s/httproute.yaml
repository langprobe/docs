# Routes docs.langprobe.com to the langprobe-docs Service on the shared
# langprobe-web Gateway. Distinct hostname — does not affect app.langprobe.com.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: langprobe-docs
  namespace: langprobe
spec:
  parentRefs:
    - name: langprobe-web
      sectionName: http
    - name: langprobe-web
      sectionName: https
  hostnames:
    - docs.langprobe.com
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: langprobe-docs
          port: 80
